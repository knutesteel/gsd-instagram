name: Trigger Vercel deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the exact commit
        uses: actions/checkout@v4

      - name: Use the production Node version
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npm run lint

      - name: Build the production bundle
        run: npm run build

      - name: Trigger production deployment
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          test -n "$DEPLOY_HOOK"
          curl --fail --silent --show-error --request POST "$DEPLOY_HOOK"
